data:
  root: ./data/raw
  target_indices: [0, 1, 4, 11]
  split: [110000, 10000]    # train/val, rest is testing
  seed: 42

model:
  hidden_dim: 128
  num_layers: 4
  dropout: 0.0

training:
  lr: 1e-3
  batch_size: 32
  epochs: 300
  scheduler: cosine

experiment:
  name: main_comparison
  output_dir: ./results